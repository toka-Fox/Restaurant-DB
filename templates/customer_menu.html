<!DOCTYPE html>
<html>
<head>
    <title>Menu | ServeSmart Bistro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="customer-body">

<nav class="customer-nav dark">
    <h2>ServeSmart Bistro</h2>
    <div>
        <a href="/customer">Home</a>
        <a href="/customer/menu">Menu</a>
        <a href="/customer/reservation">Reservations</a>
        <a href="/customer/order">Order</a>
    </div>
</nav>

<section class="customer-card">
    <h2>Our Menu</h2>

    <div class="menu-grid">
        {% for item in menu_list %}
        <div class="menu-card">
            <h3>{{ item.menu_item_name }}</h3>
            <p class="price">${{ item.menu_item_price }}</p>
            <p>Available today</p>
        </div>
        {% endfor %}
    </div>
</section>

</body>
</html>
