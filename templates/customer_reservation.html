<!DOCTYPE html>
<html>
<head>
    <title>Reservations | ServeSmart Bistro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="customer-body">

<nav class="customer-nav dark">
    <h2>ServeSmart Bistro</h2>
    <div>
        <a href="/customer">Home</a>
        <a href="/customer/menu">Menu</a>
        <a href="/customer/reservation">Reservations</a>
        <a href="/customer/order">Order</a>
    </div>
</nav>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="flash-message">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

<section class="customer-card form-card">
    <h2>Book a Reservation</h2>
    <p>Enter your information and preferred reservation time.</p>

    <form action="/customer/add_reservation" method="POST" class="customer-form">
        <input type="text" name="customer_name" placeholder="Your Name" required>
        <input type="text" name="customer_phone" placeholder="Phone" required>
        <input type="email" name="customer_email" placeholder="Email">
        <input type="text" name="reservation_time" placeholder="Reservation Time, ex: Friday 7PM" required>
        <input type="number" name="party_size" placeholder="Party Size" required>

        <input type="hidden" name="reservation_status" value="Booked">

        <button type="submit">Book Reservation</button>
    </form>
</section>

</body>
</html>
